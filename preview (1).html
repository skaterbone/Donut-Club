<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Donut Casino Final Stable</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  display:flex;
  font-family:Inter;
  color:white;
  overflow:hidden;
  background:#020617;
  position:relative;
}

/* 🌌 AURORA */
body::before{
  content:"";
  position:absolute;
  inset:-60%;
  z-index:-1;
  filter:blur(120px);
  opacity:0.75;
  background:
    radial-gradient(circle at 20% 30%, rgba(0,255,170,0.35), transparent 55%),
    radial-gradient(circle at 80% 20%, rgba(0,140,255,0.28), transparent 60%),
    radial-gradient(circle at 50% 80%, rgba(0,255,210,0.22), transparent 60%);
}

body::after{
  content:"";
  position:absolute;
  inset:-70%;
  z-index:-2;
  filter:blur(140px);
  opacity:0.6;
  background:
    radial-gradient(circle at 30% 70%, rgba(0,120,255,0.25), transparent 60%),
    radial-gradient(circle at 70% 50%, rgba(0,255,180,0.20), transparent 60%),
    radial-gradient(circle at 60% 20%, rgba(0,200,255,0.18), transparent 60%);
}

/* UI */
.sidebar{
  width:240px;
  height:100vh;
  padding:15px;
  background:#020617;
  border-right:1px solid rgba(148,163,184,0.15);
}

.sidebar h2{font-family:Orbitron;}

.sidebar button{
  width:100%;
  margin:6px 0;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#111827;
  color:white;
  cursor:pointer;
}

.activeBtn{background:#38bdf8;color:black;}

.main{flex:1;}

.balance{
  position:fixed;
  top:10px;
  right:10px;
  background:#0b1220;
  padding:10px 14px;
  border-radius:12px;
  border:1px solid rgba(148,163,184,0.15);
  color:#22c55e;
  font-weight:bold;
}

.card{
  width:650px;
  margin:60px auto;
  padding:22px;
  background:rgba(17,24,39,0.75);
  border-radius:16px;
}

.game{display:none;}
.active{display:block;}

input{
  padding:8px;
  border-radius:8px;
  border:1px solid #334155;
  background:#020617;
  color:white;
}

button.action{
  margin:5px;
  padding:9px 13px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  font-weight:bold;
  cursor:pointer;
}

.big{font-size:22px;font-weight:bold;}

.cardRow{display:flex;gap:8px;}

.playingCard{
  width:45px;height:65px;
  background:white;color:black;
  display:flex;align-items:center;justify-content:center;
  border-radius:8px;font-weight:bold;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>🍩 Casino</h2>

<button onclick="show('coin',this)" class="activeBtn">🪙 Coin</button>
<button onclick="show('wheel',this)">🎡 Wheel</button>
<button onclick="show('hilo',this)">🃏 HiLo</button>
<button onclick="show('blackjack',this)">♠️ Blackjack</button>
<button onclick="show('crash',this)">✈️ Crash</button>
</div>

<div class="main">

<div class="balance">$ <span id="bal"></span></div>

<div class="card">

<!-- COIN -->
<div id="coin" class="game active">
<h2>🪙 Coin Flip</h2>
<input id="coinBet" placeholder="Bet (k/m/b)">
<br>
<button class="action" onclick="coin('heads')">Heads</button>
<button class="action" onclick="coin('tails')">Tails</button>
<p id="coinRes" class="big"></p>
</div>

<!-- WHEEL -->
<div id="wheel" class="game">
<h2>🎡 Wheel 1-10</h2>
<input id="wheelBet" placeholder="Bet (k/m/b)">
<br>
<input id="wheelGuess" placeholder="Pick 1-10">
<br>
<button class="action" onclick="wheel()">Spin</button>
<p id="wheelRes" class="big"></p>
</div>

<!-- HI LO -->
<div id="hilo" class="game">
<h2>🃏 HiLo</h2>
<input id="hiloBet" placeholder="Bet (k/m/b)">
<p id="hiloCard" class="big"></p>
<button class="action" onclick="hi('higher')">Higher</button>
<button class="action" onclick="hi('lower')">Lower</button>
</div>

<!-- BLACKJACK -->
<div id="blackjack" class="game">
<h2>♠️ Blackjack</h2>
<input id="bjBet" placeholder="Bet (k/m/b)">
<br>
<button class="action" onclick="bjStart()">Deal</button>
<button class="action" onclick="bjHit()">Hit</button>
<button class="action" onclick="bjStand()">Stand</button>

<div class="cardRow" id="player"></div>
<div class="cardRow" id="dealer"></div>

<p id="bjText" class="big"></p>
</div>

<!-- CRASH -->
<div id="crash" class="game">
<h2>✈️ Crash</h2>
<p class="big">Multiplier: <span id="multi">1.00x</span></p>

<input id="crashBet" placeholder="Bet (k/m/b)">
<br>
<button class="action" onclick="startCrash()">Start</button>
<button class="action" onclick="cashOut()">Cash Out</button>

<p id="crashText" class="big"></p>
</div>

</div>
</div>

<script>

/* 💰 BALANCE (LOCKED SAFE) */
let bal = localStorage.getItem("bal");
bal = bal ? parseFloat(bal) : 300000000000;

function fmt(n){
  if(n>=1e9) return (n/1e9).toFixed(2)+"B";
  if(n>=1e6) return (n/1e6).toFixed(2)+"M";
  if(n>=1e3) return (n/1e3).toFixed(2)+"K";
  return Math.floor(n);
}

function update(){
  document.getElementById("bal").innerText = fmt(bal);
  localStorage.setItem("bal",bal);
}

/* BET SYSTEM */
function getBet(id){
  let v = document.getElementById(id).value;
  if(!v) return null;

  v = v.toLowerCase();
  let m = 1;
  if(v.includes("k")) m=1e3;
  if(v.includes("m")) m=1e6;
  if(v.includes("b")) m=1e9;

  let n = parseFloat(v);
  if(isNaN(n)) return null;

  let bet = n*m;
  if(bet <= 0 || bet > bal) return null;

  bal -= bet;
  update();
  return bet;
}

/* NAV */
function show(id,btn){
  document.querySelectorAll(".game").forEach(g=>g.classList.remove("active"));
  document.querySelectorAll(".sidebar button").forEach(b=>b.classList.remove("activeBtn"));
  document.getElementById(id).classList.add("active");
  btn.classList.add("activeBtn");
}

/* 🪙 COIN */
function coin(c){
  let b=getBet("coinBet"); if(!b) return;
  let r=Math.random()<0.5?"heads":"tails";
  coinRes.innerText=r;
  if(r===c) bal+=b*2;
  update();
}

/* 🎡 WHEEL */
function wheel(){
  let b=getBet("wheelBet"); if(!b) return;
  let g=parseInt(wheelGuess.value);
  let r=Math.floor(Math.random()*10+1);
  wheelRes.innerText=r;
  if(r===g) bal+=b*10;
  update();
}

/* 🃏 HI LO */
let card=Math.floor(Math.random()*13)+1;
function renderHi(){hiloCard.innerText="🃏 "+card;}
renderHi();

function hi(type){
  let b=getBet("hiloBet"); if(!b) return;
  let n=Math.floor(Math.random()*13)+1;

  if((type==="higher"&&n>card)||(type==="lower"&&n<card)){
    bal+=b*2;
  }

  card=n;
  renderHi();
  update();
}

/* ♠️ BLACKJACK (SIMPLE BUT WORKING) */
function bjStart(){
  let b=getBet("bjBet"); if(!b) return;
  let p1=Math.floor(Math.random()*11)+1;
  let p2=Math.floor(Math.random()*11)+1;
  let d1=Math.floor(Math.random()*11)+1;
  let d2=Math.floor(Math.random()*11)+1;

  let ps=p1+p2;
  let ds=d1+d2;

  player.innerHTML="["+p1+","+p2+"]";
  dealer.innerHTML="["+d1+","+d2+"]";

  if(ps>21) bjText.innerText="Bust";
  else if(ps>ds||ds>21){bal+=b*2; bjText.innerText="Win";}
  else bjText.innerText="Lose";

  update();
}

/* ✈️ CRASH */
let run=0,m=1,intv,cb=0,cap=0;

function startCrash(){
  cb=getBet("crashBet"); if(!cb) return;
  m=1;run=1;cap=Math.random()*4+1.5;

  intv=setInterval(()=>{
    m+=0.05;
    multi.innerText=m.toFixed(2)+"x";

    if(m>=cap){
      clearInterval(intv);
      run=0;
      crashText.innerText="CRASH "+cap.toFixed(2);
    }
  },80);
}

function cashOut(){
  if(!run) return;
  clearInterval(intv);
  run=0;
  bal+=cb*m;
  crashText.innerText="+"+fmt(cb*m);
  update();
}

update();

</script>

</body>
</html>
